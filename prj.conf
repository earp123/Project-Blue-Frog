# ---- Common ----
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_PRINTK=y
CONFIG_SPI=y
CONFIG_GPIO=y

# ---- LoRa (Wio-SX1262 shield, spi2 / port 1) ----
CONFIG_LORA=y
CONFIG_LORA_MODULE_BACKEND_NATIVE=y
CONFIG_LORA_SX126X_NATIVE=y
CONFIG_LORA_LOG_LEVEL_DBG=y

# The display / touch / SD shield's own configuration lives in
# boards/nrf5340dk_nrf5340_cpuapp_display.conf and is applied via
# EXTRA_CONF_FILE alongside its overlay. It is kept out of prj.conf so the
# LoRa-only build does not pull in FATFS (which fails to build with no disk).
