# Telemetry console — companion config for the Hiletgo TFT breakout overlay
# boards/nrf5340dk_nrf5340_cpuapp_display.overlay.
#
# Apply together with the overlay:
#   -DEXTRA_DTC_OVERLAY_FILE=boards/nrf5340dk_nrf5340_cpuapp_display.overlay
#   -DEXTRA_CONF_FILE=boards/nrf5340dk_nrf5340_cpuapp_display.conf
#
# Kept separate from prj.conf so the LoRa-only build does not enable the
# display subsystem / FATFS (FATFS fails to build with no disk volume present).

# Select the telemetry console application variant (see Kconfig).
CONFIG_APP_CONSOLE=y

# Display: ILI9341 over MIPI-DBI-SPI
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y
# Reuse CFB's bundled fonts as glyph data; we blit RGB565 ourselves because
# CFB's own framebuffer is monochrome-only and cannot drive the ILI9341.
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# Touch: XPT2046 via the input subsystem; DK buttons via gpio-keys
CONFIG_INPUT=y
CONFIG_INPUT_GPIO_KEYS=y

# SD card over SPI + FAT filesystem
CONFIG_DISK_ACCESS=y
CONFIG_SDHC=y
CONFIG_SDMMC_STACK=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y

CONFIG_MAIN_STACK_SIZE=8192
